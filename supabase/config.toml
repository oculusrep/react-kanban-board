# Supabase configuration

# QuickBooks OAuth callback needs to be publicly accessible
# because it's called by QuickBooks redirect (no apikey header possible)
[functions.quickbooks-callback]
verify_jwt = false

# Cron-driven queue drainer. Takes no parameters, has no side effects beyond
# sending already-queued portal-comment alerts. Skipping JWT verification
# avoids needing a vault-stored service_role_key for the pg_cron job.
[functions.send-portal-comment-alert]
verify_jwt = false

# MCP server consumed by the OpenClaw market-research subagent. Auth is via the
# Authorization: Bearer <OVIS_MCP_BEARER_TOKEN> header, validated inside the
# function. Skipping Supabase JWT lets OpenClaw call without minting a user JWT.
[functions.ovis-research-mcp]
verify_jwt = false
